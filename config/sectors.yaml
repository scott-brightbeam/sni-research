# SNI Research Tool - Sector Keyword Definitions
#
# MATCHING RULES:
# - An article must match at least one term from EACH required_any group
# - Matching runs against title + first 800 chars of text ONLY
#   (prevents general AI articles mentioning sector terms in passing)
# - Boost terms increase priority score for tiebreaking between sectors
# - General is the fallback for frontier AI news with no clear sector match
#
# CANONICAL AI TERMS PRINCIPLE:
# - required_any_group_1 (AI terms) MUST be identical across ALL sectors
# - Never add sector-specific terms to group 1 — those belong in group 2
# - Never add company names to group 1 — those belong in group 2 or boost
# - When updating AI terms, update ALL sectors simultaneously
#
# FALSE POSITIVE RISK NOTES:
# - Short acronyms (2-3 chars) are risky in Group 2 (e.g. "CV" matches "CVS")
# - Company names must be distinctive (e.g. "Olympus Medical" not "Olympus")
# - Generic nouns like "yield" or "packaging" alone will flood the pipeline
# - Acronyms like NDA, PLC, AMR, STP have common non-sector meanings
# - All matching is case-insensitive

