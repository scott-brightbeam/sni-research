# SNI Research Tool - Search Query Configuration
#
# Template variables (resolved at runtime):
#   {month} → current month name (e.g., "March")
#   {year}  → current year (e.g., "2026")
#   {date}  → human-readable date for last 3 days (e.g., "March 5 2026")
#
# Layers:
#   L1 (sector sweeps) — broad sector coverage, past month
#   L2 (source targeting) — site: queries for high-value publications, past week
#   L3 (cross-sector themes) — trending topics across all sectors, past month
#   L4 (daily experiment) — L1 queries with {date} instead of {month} {year}, past week

search_queries:
  freshness:
    layer1: pm    # past month — broad sweeps benefit from wider window
    layer2: pw    # past week — source-specific, want recency
    layer3: pm    # past month — thematic queries benefit from wider window
    layer4: pw    # past week — daily experiment needs recency

  layer1_sector:
