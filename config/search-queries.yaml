headline_sources:
  # SSR-viable targets only (confirmed by Gemini report)
  # CSR-heavy targets excluded: Bloomberg, The Times UK, MIT Tech Review
  - name: Financial Times AI
    url: https://www.ft.com/artificial-intelligence
    selector: ".o-teaser__heading"
  - name: STAT News Health Tech
    url: https://statnews.com/category/health-tech/
    selector: ".article-item__title span"
  - name: Insurance Journal AI
    url: https://www.insurancejournal.com/ai/
    selector: ".topic-article h4"             # Fixed Mar 2026 — was ".article-list h2, .article-list h3" (returned 0 headlines)
  - name: Harvard Business Review AI
    url: https://hbr.org/topic/subject/ai-and-machine-learning
    selector: "article h3 a, .stream-item h3 a"
  # The Economist — removed: returns HTTP 403 for all server-side requests (anti-bot protection).
  # Would need headless browser; not compatible with our fetchPage() approach.
  - name: Wired Science
    url: https://www.wired.com/category/science/
    selector: ".summary-item__hed"
  - name: Endpoints News
    url: https://endpts.com
    selector: "article h2 a, article h3 a"  # Needs robust HTTP headers
