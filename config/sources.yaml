      name: GlobeNewswire AI
    # PR Newswire skipped: no server-side AI filtering available

# Brave Search queries for the general AI feed
# These are searched with freshness=pw (past week)
# general_search_queries: REMOVED — migrated to config/search-queries.yaml L3 themes
# (9 Apr 2026). These queries were never loaded by any script. Now wired into the
# Brave Search pipeline with proper {month} {year} templates. Sector-specific queries
# (biopharma, insurance, manufacturing) already overlap with L1 sector sweeps.

# Known reliable URL date patterns (for verification)
url_date_patterns:
  - publisher: BusinessWire
    pattern: "/\\d{8}/"
    format: "YYYYMMDD"
  - publisher: Insurance Journal
    pattern: "/\\d{4}/\\d{2}/\\d{2}/"
    format: "YYYY/MM/DD"
  - publisher: Healthcare Brew
    pattern: "/stories/\\d{4}/\\d{2}/\\d{2}/"
    format: "YYYY/MM/DD"
  - publisher: GlobeNewsWire
    pattern: "/\\d{4}/\\d{2}/\\d{2}/"
    format: "YYYY/MM/DD"
  - publisher: CNBC
    pattern: "/\\d{4}/\\d{2}/\\d{2}/"
    format: "YYYY/MM/DD"

# Paywalled domains to skip entirely
paywall_domains:
  - bloomberg.com
  - ft.com
  - wsj.com
  - thetimes.co.uk
  - economist.com
  - hbr.org
