# SNI Research Tool - Source Configuration
#
# Feed categories:
#   Sector-specific (biopharma, medtech, manufacturing, insurance) — sector hint passed to categoriser
#   Cross-sector (cross_sector, ai_labs, tech_press, newsletters, wire_services) — categorised by content

rss_feeds:
  biopharma:
    - url: https://www.biopharmadive.com/feeds/news/
      name: BioPharma Dive
    - url: https://www.clinicaltrialsarena.com/feed/
      name: Clinical Trials Arena
    - url: https://www.pharmaceutical-technology.com/feed/
      name: Pharmaceutical Technology
    # Removed (dead Feb 2026): medcitynews.com/feed (403), statnews.com/feed (paywalled),
    #   endpts.com/feed (paywalled), pharmatimes.com/rss (paywalled),
    #   biospace.com/rss/ (404), fiercebiotech.com (403)

  medtech:
    - url: https://www.medtechdive.com/feeds/news/
      name: MedTech Dive
    - url: https://www.mobihealthnews.com/feed
      name: MobiHealthNews
    - url: https://rockhealth.com/feed/
      name: Rock Health
    - url: https://www.fda.gov/about-fda/contact-fda/stay-informed/rss-feeds/press-releases/rss.xml
      name: FDA Press Releases
    # Removed (dead Feb 2026): healthcareitnews.com/feed (paywalled),
    #   fiercehealthcare.com/rss/xml (403), massdevice.com/feed (404)

  manufacturing:
    - url: https://www.manufacturingdive.com/feeds/news/
      name: Manufacturing Dive
    - url: https://www.therobotreport.com/feed/
      name: The Robot Report
    - url: https://semiengineering.com/feed/
      name: Semiconductor Engineering
    # Removed (dead Feb 2026): roboticsandautomationnews.com/feed (0 content),
    #   automationworld.com/rss (404)

  insurance:
    - url: https://insurancethoughtleadership.com/feed/
      name: Insurance Thought Leadership
    # Removed (dead Feb 2026): insurancejournal.com/rss/news (paywalled),
    #   eu-startups.com/feed (paywalled), intelligentinsurer.com/rss (404),
    #   insnerds.com/feed (404), insuranceciooutlook.com/rss_feed (malformed XML),
    #   reinsurancene.ws/feed (timeouts), dig-in.com/feed (returns HTML not RSS)
    # Note: insurance RSS landscape is very thin - Brave Search supplements this sector

  cross_sector:
    - url: https://www.pymnts.com/feed/
      name: PYMNTS
    - url: https://news.samsung.com/global/feed
      name: Samsung Newsroom

  # AI lab newsrooms — direct source for frontier AI announcements
  ai_labs:
    - url: https://blogs.nvidia.com/feed/
      name: NVIDIA Blog
    - url: https://openai.com/news/rss.xml
      name: OpenAI News
    - url: https://deepmind.google/blog/rss.xml
      name: Google DeepMind Blog
    - url: https://www.amazon.science/index.rss
      name: Amazon Science
    - url: https://research.google/blog/rss/
      name: Google Research Blog
    - url: https://www.microsoft.com/en-us/research/feed/
      name: Microsoft Research
    # Removed (dead Feb 2026): machinelearning.apple.com/feed.xml (404)

  # AI-focused beats from major tech publications
  tech_press:
    - url: https://techcrunch.com/category/artificial-intelligence/feed/
      name: TechCrunch AI
    - url: https://venturebeat.com/category/ai/feed/
      name: VentureBeat AI
    - url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
      name: The Verge AI
    - url: https://feeds.arstechnica.com/arstechnica/technology-lab
      name: Ars Technica
    - url: https://www.theregister.com/headlines.atom
      name: The Register

  # Curated AI digests with RSS feeds
  newsletters:
    - url: https://importai.substack.com/feed
      name: Import AI
    - url: https://www.lastweekinai.com/feed.xml
      name: Last Week in AI
    - url: https://rss.beehiiv.com/feeds/N4eCstxvgX.xml
      name: The Neuron
    - url: https://huggingface.co/blog/feed.xml
      name: Hugging Face Blog
    # Removed (broken Feb 2026): hai.stanford.edu/rss.xml (malformed XML)

  # Press release wire services with AI keyword filtering
  wire_services:
    - url: https://rss.globenewswire.com/RssFeed/Language/EN/Search/Artificial%20Intelligence/Max/100
      name: GlobeNewswire AI
    # PR Newswire skipped: no server-side AI filtering available

# Brave Search queries for the general AI feed
# These are searched with freshness=pw (past week)
general_search_queries:
  - "OpenAI new model release 2026"
  - "Anthropic Claude release announcement 2026"
  - "Google DeepMind AI announcement 2026"
  - "Meta AI model release 2026"
  - "Mistral AI model release 2026"
  - "xAI Grok release 2026"
  - "Cohere AI release 2026"
  - "AWS Bedrock new AI service 2026"
  - "Azure OpenAI new feature 2026"
  - "Google Cloud AI new service 2026"
  - "SaaSpocalypse AI agents replacing SaaS"
  - "agentic AI enterprise software 2026"
  - "AI regulation EU UK February 2026"
  - "open source AI model release February 2026"
  - "AI startup funding round February 2026"
  - "foundation model benchmark release 2026"
  - "AI safety incident February 2026"
  - "hyperscaler AI enterprise announcement 2026"
  - "semiconductor AI manufacturing 2026"
  - "industrial AI robotics manufacturing 2026"
  - "AI drug discovery biopharma 2026"
  - "AI medical device FDA clearance 2026"
  - "insurtech AI underwriting 2026"

# Known reliable URL date patterns (for verification)
url_date_patterns:
  - publisher: BusinessWire
    pattern: "/\\d{8}/"
    format: "YYYYMMDD"
  - publisher: Insurance Journal
    pattern: "/\\d{4}/\\d{2}/\\d{2}/"
    format: "YYYY/MM/DD"
  - publisher: Healthcare Brew
    pattern: "/stories/\\d{4}/\\d{2}/\\d{2}/"
    format: "YYYY/MM/DD"
  - publisher: GlobeNewsWire
    pattern: "/\\d{4}/\\d{2}/\\d{2}/"
    format: "YYYY/MM/DD"
  - publisher: CNBC
    pattern: "/\\d{4}/\\d{2}/\\d{2}/"
    format: "YYYY/MM/DD"

# Paywalled domains to skip entirely
paywall_domains:
  - bloomberg.com
  - ft.com
  - wsj.com
  - thetimes.co.uk
  - economist.com
  - hbr.org
