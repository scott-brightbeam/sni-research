      name: Clinical Trials Arena
    - url: https://www.pharmaceutical-technology.com/feed/
      name: Pharmaceutical Technology
    - url: https://www.statnews.com/feed/
      name: STAT News                       # Re-added Mar 2026 — mostly STAT+ (paywalled), free articles pass through
    - url: https://endpts.com/feed/
      name: Endpoints News                  # Re-added Mar 2026 — feed serving despite partial paywall
    - url: https://www.nature.com/nbt.rss
      name: Nature Biotechnology            # Added Mar 2026 — high-quality, "Agentic AI in biomedical research" etc.
    - url: https://www.gov.uk/search/news-and-communications.atom?organisations%5B%5D=medicines-and-healthcare-products-regulatory-agency
      name: UK MHRA news                    # Added Apr 2026 — caught in-silico trial commencement gap in Week 17 retro
    - url: https://www.ema.europa.eu/en/rss.xml
      name: EMA news                        # Added Apr 2026 — EU regulator AI guidance stream
    # Removed (dead/blocked): medcitynews.com/feed (403), pharmatimes.com/rss (paywalled),
    #   biospace.com/rss/ (404), drugdiscoveryonline.com/feed (404),
    #   fiercebiotech.com/rss/xml (RSS 403 to bots), fiercepharma.com/rss/xml (articles 403)

