name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'
      - run: cd web/api && bun install
      - run: cd web/api && bun test
        env:
          SNI_TEST_MODE: '1'

# Fly deploys are handled locally via a pre-push git hook
# (scripts/git-hooks/pre-push). See scripts/git-hooks/pre-push for details.
# To enable on a fresh clone: git config core.hooksPath scripts/git-hooks
